<!DOCTYPE html>
<html>

    <title>StackOne Hub — Web Component Demo</title>
    <script src="dist/webcomponent.js"></script>
  </head>
  <body>
    <stackone-hub
      id="hub"
      token="eyJyZWdpb25fc2x1ZyI6ImV1IiwidG9rZW4iOiJNWGEyUU4xZzFnU1ZDNGpzdkU5YmlCU0dJSnVtbUtsVmphMTkyODM2Qkc1cEtHdTZxdkdteV9WdXdFaHZKS05NdXYwUlJ4Nlg1SHZqYlhUQWhMZ19udyJ9"
      base-url="http://localhost:4000"
      mode="integration-picker"
      height="600px"
      theme="light"

    <script>
      const el = document.getElementById('hub');

      el.addEventListener('success', (event) => {
        console.log('[hub] success', event.detail);
      });

      el.addEventListener('close', () => {
        console.log('[hub] close');
      });
